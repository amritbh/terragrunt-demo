# Manual Teardown Workflow for Terragrunt
#
# TRIGGERS:
#   - Manual dispatch from the GitHub Actions UI (workflow_dispatch)
#
# PURPOSE:
#   Safely destroy entire environments (like dev, uat, prod) via CI/CD
#   rather than running destroy commands locally.

name: Manual Teardown (Destroy)

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Which project to destroy?'
        required: true
        type: choice
        options:
          - 'End-To-End-Project (EKS Stack)'
          - 'Project 1 (VPC Multi-Env)'
          - 'All Projects (Everything)'
      environment:
        description: 'Which environment to destroy?'
        required: true
        type: choice
        options:
          - 'dev'
          - 'uat'
          - 'prod'
      confirmation:
        description: 'Type "DESTROY" to confirm you want to delete these resources'
        required: true
        type: string

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.9.0
  TG_VERSION: 1.0.1
  TERRAGRUNT_NON_INTERACTIVE: "true"

permissions:
  contents: read

jobs:
  destroy:
    name: Destroy [${{ github.event.inputs.project }} - ${{ github.event.inputs.environment }}]
    runs-on: ubuntu-latest
    
    # Use environment gates so production deletion still requires approval!
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Verify Confirmation
        if: github.event.inputs.confirmation != 'DESTROY'
        run: |
          echo "Error: You must type exactly 'DESTROY' in the confirmation box."
          exit 1

      # Working directory is set dynamically in the Destroy step below

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -sL https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TG_VERSION }}/terragrunt_linux_amd64 \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Terragrunt Init & Destroy
        run: |
          if [ "${{ github.event.inputs.project }}" == "End-To-End-Project (EKS Stack)" ] || [ "${{ github.event.inputs.project }}" == "All Projects (Everything)" ]; then
            if [ "${{ github.event.inputs.environment }}" != "dev" ]; then
              echo "Error: End-To-End-Project currently only has a 'dev' environment configured."
              exit 1
            fi
            echo "Destroying End-To-End-Project..."
            cd End-To-End-Project/infrastructure-live/dev
            terragrunt init --all
            terragrunt destroy --all -auto-approve
            cd -
          fi
          
          if [ "${{ github.event.inputs.project }}" == "Project 1 (VPC Multi-Env)" ] || [ "${{ github.event.inputs.project }}" == "All Projects (Everything)" ]; then
            echo "Destroying Project 1 (${{ github.event.inputs.environment }})..."
            cd infrastructure-live/${{ github.event.inputs.environment }}/vpc
            terragrunt init --all
            terragrunt destroy --all -auto-approve
            cd -
          fi
