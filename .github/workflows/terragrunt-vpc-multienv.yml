# Terragrunt CI/CD — Project 1: Multi-environment VPC (dev / uat / prod)
#
# TRIGGERS:
#   - Pull Request → runs plan on changed environment only
#   - Push to main → runs apply on changed environment only
#
# REQUIRED GITHUB SECRETS:
#   AWS_ACCESS_KEY_ID       - AWS IAM access key
#   AWS_SECRET_ACCESS_KEY   - AWS IAM secret key

name: Terragrunt CI/CD - VPC Multi-Env

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'infrastructure-live/**'
      - 'infrastructure-modules/**'
  push:
    branches:
      - main
    paths:
      - 'infrastructure-live/**'
      - 'infrastructure-modules/**'

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.9.0
  TG_VERSION: 1.0.1
  TERRAGRUNT_NON_INTERACTIVE: "true"

permissions:
  contents: read
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────────────────
  # Plan Matrix — runs plan for each environment in parallel
  # ─────────────────────────────────────────────────────────
  plan:
    name: Plan [${{ matrix.environment }}]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        environment: [dev, uat, prod]
      fail-fast: false  # Plan all envs even if one fails

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -sL https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TG_VERSION }}/terragrunt_linux_amd64 \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Terragrunt Init [${{ matrix.environment }}]
        working-directory: infrastructure-live/${{ matrix.environment }}/vpc
        run: terragrunt init

      - name: Terragrunt Plan [${{ matrix.environment }}]
        id: plan
        working-directory: infrastructure-live/${{ matrix.environment }}/vpc
        run: |
          terragrunt plan 2>&1 | tee plan_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post Plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('infrastructure-live/${{ matrix.environment }}/vpc/plan_output.txt', 'utf8');
            const maxLen = 30000;
            const truncated = planOutput.length > maxLen ? planOutput.slice(0, maxLen) + '\n...(truncated)' : planOutput;
            const body = `## 🔍 Terragrunt Plan — \`${{ matrix.environment }}\` VPC\n\n<details><summary>Expand plan</summary>\n\n\`\`\`hcl\n${truncated}\n\`\`\`\n\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exit_code != '0'
        run: exit 1

  # ─────────────────────────────────────────────────────────
  # Apply dev — auto on merge
  # ─────────────────────────────────────────────────────────
  apply-dev:
    name: Apply [dev]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - name: Install Terragrunt
        run: |
          curl -sL https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TG_VERSION }}/terragrunt_linux_amd64 \
            -o /usr/local/bin/terragrunt && chmod +x /usr/local/bin/terragrunt
      - name: Apply dev VPC
        working-directory: infrastructure-live/dev/vpc
        run: terragrunt apply -auto-approve

  # ─────────────────────────────────────────────────────────
  # Apply uat — requires manual approval (configure in GitHub Environments)
  # ─────────────────────────────────────────────────────────
  apply-uat:
    name: Apply [uat]
    runs-on: ubuntu-latest
    needs: apply-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: uat
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - name: Install Terragrunt
        run: |
          curl -sL https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TG_VERSION }}/terragrunt_linux_amd64 \
            -o /usr/local/bin/terragrunt && chmod +x /usr/local/bin/terragrunt
      - name: Apply uat VPC
        working-directory: infrastructure-live/uat/vpc
        run: terragrunt apply -auto-approve

  # ─────────────────────────────────────────────────────────
  # Apply prod — requires manual approval
  # ─────────────────────────────────────────────────────────
  apply-prod:
    name: Apply [prod]
    runs-on: ubuntu-latest
    needs: apply-uat
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - name: Install Terragrunt
        run: |
          curl -sL https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TG_VERSION }}/terragrunt_linux_amd64 \
            -o /usr/local/bin/terragrunt && chmod +x /usr/local/bin/terragrunt
      - name: Apply prod VPC
        working-directory: infrastructure-live/prod/vpc
        run: terragrunt apply -auto-approve
